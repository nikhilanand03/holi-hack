<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Multi Metric Cards</title>
<style>
.metrics-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
}
.metrics-slide .slide-title {
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 32px;
    animation: fade-up 0.6s ease-out both paused;
}
.metrics-slide .metrics-grid {
    display: grid;
    gap: 24px;
    flex: 1;
    align-content: stretch;
}
.metrics-slide .metric-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 44px;
    display: flex;
    align-items: center;
    gap: 36px;
    animation: fade-up 0.6s ease-out both paused;
}
.metrics-slide .metric-value {
    font-size: 60px;
    font-weight: 700;
    min-width: 200px;
}
.metrics-slide .metric-info h3 {
    font-size: 32px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
}
.metrics-slide .metric-info p {
    font-size: 26px;
    color: var(--text-secondary);
}
@keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="metrics-slide">
    <div class="slide-title" id="title"></div>
    <div class="metrics-grid" id="grid"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
const colors = ['var(--accent-indigo)','var(--accent-cyan)','var(--accent-emerald)','var(--accent-amber)','var(--accent-rose)'];
document.getElementById('title').textContent = D.title || '';
const grid = document.getElementById('grid');
const metrics = D.metrics || [];
grid.style.gridTemplateColumns = metrics.length <= 3 ? '1fr' : 'repeat(2, 1fr)';
grid.style.gridAutoRows = '1fr';
metrics.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'metric-card';
    card.style.animationDelay = (0.3 + i * 0.15) + 's';
    card.innerHTML = `
        <div class="metric-value" style="color:${colors[i % colors.length]}">${m.value || ''}</div>
        <div class="metric-info">
            <h3>${m.label || ''}</h3>
            <p>${m.description || ''}</p>
        </div>`;
    grid.appendChild(card);
});
</script>
</body>
</html>
