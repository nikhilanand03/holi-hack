<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Bullet List</title>
<style>
.bullet-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 0 128px;
    position: relative;
    overflow: hidden;
}
.bullet-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    padding: 80px;
    width: 100%;
    animation: fade-up 0.8s ease-out both;
}
.bullet-card h2 {
    font-family: var(--font-heading);
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    margin-bottom: 40px;
}
.bullet-card ul {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 32px;
}
.bullet-card li {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    font-family: var(--font-body);
    font-size: 24px;
    color: var(--text-primary);
    line-height: 1.5;
}
.bullet-card .bullet-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent-primary);
    margin-top: 12px;
    flex-shrink: 0;
}
</style>
</head>
<body>
<div class="bullet-slide">
    <div class="bullet-card">
        <h2 id="title"></h2>
        <ul id="items"></ul>
    </div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || 'Key Points';
const list = document.getElementById('items');
const items = D.items || [];
items.forEach((item, i) => {
    const li = document.createElement('li');
    li.style.animationDelay = (0.2 + i * 0.1) + 's';
    const text = typeof item === 'string' ? item : (item.label || item.text || '');
    li.innerHTML = `<div class="bullet-dot"></div><span>${text}</span>`;
    list.appendChild(li);
});
</script>
</body>
</html>
