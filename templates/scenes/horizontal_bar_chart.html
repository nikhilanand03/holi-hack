<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<title>Horizontal Bar Chart</title>
<style>
.chart-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    padding: 80px 120px;
    overflow: hidden;
}
.chart-slide .slide-title { font-size: 42px; font-weight: 600; margin-bottom: 32px; }
.chart-slide .chart-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
.chart-slide canvas { max-width: 1600px; max-height: 800px; }
.chart-slide .caption { font-size: 20px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
<div class="chart-slide">
    <div class="slide-title" id="title"></div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div class="caption" id="caption"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
if (D.caption) document.getElementById('caption').textContent = D.caption;
const palette = ['#818cf8','#22d3ee','#34d399','#fbbf24','#fb7185','#60a5fa','#a78bfa'];
new Chart(document.getElementById('chart').getContext('2d'), {
    type: 'bar',
    data: {
        labels: D.labels || [],
        datasets: [{
            label: D.dataset_label || '',
            data: D.values || [],
            backgroundColor: (D.values || []).map((_, i) => palette[i % palette.length]),
            borderRadius: 6,
            borderSkipped: false,
        }]
    },
    options: {
        indexAxis: 'y',
        responsive: true,
        animation: false,
        plugins: { legend: { display: !!D.dataset_label, labels: { color: '#9aa0b4', font: { size: 24 } } } },
        scales: {
            x: {
                ticks: { color: '#9aa0b4', font: { size: 22 } },
                grid: { color: '#2d3348' },
                beginAtZero: true,
                title: { display: !!D.x_label, text: D.x_label || '', color: '#9aa0b4', font: { size: 24 } },
            },
            y: { ticks: { color: '#9aa0b4', font: { size: 22 } }, grid: { color: '#2d3348' } }
        }
    }
});
</script>
</body>
</html>
