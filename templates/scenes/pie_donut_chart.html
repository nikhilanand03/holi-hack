<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<title>Pie / Donut Chart</title>
<style>
.chart-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    padding: 80px 120px;
    overflow: hidden;
}
.chart-slide .slide-title { font-size: 42px; font-weight: 600; margin-bottom: 32px; text-align: center; }
.chart-slide .chart-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
.chart-slide canvas { max-width: 700px; max-height: 700px; }
.chart-slide .caption { font-size: 20px; color: var(--text-muted); margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="chart-slide">
    <div class="slide-title" id="title"></div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
    <div class="caption" id="caption"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
if (D.caption) document.getElementById('caption').textContent = D.caption;
const palette = ['#818cf8','#22d3ee','#34d399','#fbbf24','#fb7185','#60a5fa','#a78bfa','#f87171'];
const isDonut = D.donut !== false; // default to donut
new Chart(document.getElementById('chart').getContext('2d'), {
    type: 'doughnut',
    data: {
        labels: D.labels || [],
        datasets: [{
            data: D.values || [],
            backgroundColor: palette.slice(0, (D.values || []).length),
            borderWidth: 2,
            borderColor: '#0f1117',
        }]
    },
    options: {
        responsive: true,
        animation: false,
        cutout: isDonut ? '55%' : 0,
        plugins: {
            legend: {
                position: 'right',
                labels: { color: '#9aa0b4', font: { size: 24 }, padding: 20 },
            }
        }
    }
});
</script>
</body>
</html>
