<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '$', right: '$', display: false}]});"></script>
<title>Flashcard List</title>
<style>
.flashcard-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
}
.flashcard-slide .slide-title {
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 32px;
    animation: fade-up 0.6s ease-out both paused;
}
.flashcard-slide .cards-grid {
    display: grid;
    gap: 20px;
    flex: 1;
    align-content: stretch;
}
.flashcard-slide .fcard {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 40px;
    display: flex;
    align-items: center;
    gap: 28px;
    animation: fade-up 0.5s ease-out both paused;
}
.flashcard-slide .fcard-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
    font-weight: 700;
    color: var(--bg-primary);
}
.flashcard-slide .fcard-body h3 {
    font-size: 32px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
}
.flashcard-slide .fcard-body p {
    font-size: 26px;
    color: var(--text-secondary);
    line-height: 1.5;
}
@keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
<div class="flashcard-slide">
    <div class="slide-title" id="title"></div>
    <div class="cards-grid" id="cards"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
const colors = ['var(--accent-indigo)','var(--accent-cyan)','var(--accent-emerald)','var(--accent-amber)','var(--accent-rose)'];
document.getElementById('title').textContent = D.title || '';
const grid = document.getElementById('cards');
const items = D.items || [];
// Adjust grid columns based on item count
grid.style.gridTemplateColumns = items.length <= 3 ? '1fr' : 'repeat(2, 1fr)';
// Stretch rows to fill available space
grid.style.gridAutoRows = '1fr';
items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'fcard';
    card.style.animationDelay = (0.3 + i * 0.15) + 's';
    const iconColor = colors[i % colors.length];
    card.innerHTML = `
        <div class="fcard-icon" style="background:${iconColor}">${i + 1}</div>
        <div class="fcard-body">
            <h3>${item.label || ''}</h3>
            <p>${item.description || ''}</p>
        </div>`;
    grid.appendChild(card);
});
</script>
</body>
</html>
