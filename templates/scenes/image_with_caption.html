<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Image with Caption</title>
<style>
.image-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 160px;
    position: relative;
    overflow: hidden;
}
.image-slide .slide-title {
    font-size: 42px;
    font-weight: 600;
    margin-bottom: 36px;
    text-align: center;
}
.image-slide .image-container {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    max-width: 1400px;
    text-align: center;
}
.image-slide .image-container img {
    max-width: 100%;
    max-height: 600px;
    border-radius: 12px;
}
.image-slide .caption {
    font-size: 24px;
    color: var(--text-secondary);
    margin-top: 24px;
    max-width: 1000px;
    text-align: center;
    line-height: 1.5;
}
</style>
</head>
<body>
<div class="image-slide">
    <div class="slide-title" id="title"></div>
    <div class="image-container">
        <img id="image" src="" alt="">
    </div>
    <div class="caption" id="caption"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
document.getElementById('caption').textContent = D.caption || '';
if (D.image_path) document.getElementById('image').src = D.image_path;
</script>
</body>
</html>
