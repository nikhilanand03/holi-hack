<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Section Header</title>
<style>
.section-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 0 128px;
    position: relative;
    overflow: hidden;
}
.section-slide .section-number {
    font-family: var(--font-mono);
    font-size: 24px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 24px;
    animation: fade-up 0.6s ease-out both;
}
.section-slide h2 {
    font-family: var(--font-heading);
    font-size: 64px;
    font-weight: 600;
    letter-spacing: -1px;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 32px;
    max-width: 1000px;
    animation: fade-up 0.7s ease-out 0.1s both;
}
.section-slide .tagline {
    font-family: var(--font-body);
    font-size: 28px;
    font-weight: 400;
    color: var(--text-secondary);
    line-height: 1.5;
    max-width: 800px;
    animation: fade-up 0.7s ease-out 0.2s both;
}
</style>
</head>
<body>
<div class="section-slide">
    <div class="section-number" id="section-number"></div>
    <h2 id="heading"></h2>
    <p class="tagline" id="tagline"></p>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('section-number').textContent = D.section_number || '';
document.getElementById('heading').textContent = D.heading || '';
if (D.tagline) {
    document.getElementById('tagline').textContent = D.tagline;
}
</script>
</body>
</html>
