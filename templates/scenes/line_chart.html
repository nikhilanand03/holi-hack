<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<title>Line Chart</title>
<style>
.chart-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 96px 128px;
    position: relative;
    overflow: hidden;
}
.chart-slide h2 {
    font-family: var(--font-heading);
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    margin-bottom: 40px;
}
.chart-card {
    width: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    padding: var(--card-padding);
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}
.chart-card canvas {
    max-width: 100%;
    max-height: 100%;
}
.chart-slide .caption {
    font-family: var(--font-body);
    font-size: 16px;
    color: var(--text-secondary);
    margin-top: 24px;
}
</style>
</head>
<body>
<div class="chart-slide">
    <h2 id="title"></h2>
    <div class="chart-card">
        <canvas id="chart"></canvas>
    </div>
    <div class="caption" id="caption"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
if (D.caption) document.getElementById('caption').textContent = D.caption;

const lineColors = ['#2563EB', '#DC2626', '#059669', '#D97706', '#7C3AED'];
const datasets = (D.datasets || []).map((ds, i) => ({
    label: ds.label || `Series ${i + 1}`,
    data: ds.data || ds.values || [],
    borderColor: lineColors[i % lineColors.length],
    backgroundColor: lineColors[i % lineColors.length],
    borderWidth: 3,
    pointRadius: 8,
    pointBackgroundColor: '#FFFFFF',
    pointBorderWidth: 2,
    pointBorderColor: lineColors[i % lineColors.length],
    tension: 0.3,
    fill: false,
}));

const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
    type: 'line',
    data: {
        labels: D.labels || [],
        datasets: datasets,
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
            legend: {
                display: datasets.length > 1,
                position: 'top',
                labels: {
                    color: '#6B7280',
                    font: { family: 'Inter', size: 14 },
                    usePointStyle: true,
                    pointStyle: 'circle',
                }
            },
        },
        scales: {
            x: {
                ticks: { color: '#6B7280', font: { family: 'Inter', size: 16 } },
                grid: { display: false },
                border: { color: '#D1D5DB' },
                title: { display: !!D.x_label, text: D.x_label || '', color: '#6B7280', font: { family: 'Inter', size: 16 } },
            },
            y: {
                ticks: { color: '#6B7280', font: { family: 'Inter', size: 16 } },
                grid: { color: '#F3F4F6', lineWidth: 1 },
                border: { color: '#D1D5DB' },
                title: { display: !!D.y_label, text: D.y_label || '', color: '#6B7280', font: { family: 'Inter', size: 16 } },
            }
        }
    }
});
</script>
</body>
</html>
