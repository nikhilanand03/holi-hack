<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<title>Bar Chart</title>
<style>
.chart-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 96px 128px;
    position: relative;
    overflow: hidden;
}
.chart-slide h2 {
    font-family: var(--font-heading);
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    margin-bottom: 40px;
}
.chart-card {
    width: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    padding: var(--card-padding);
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}
.chart-card canvas {
    max-width: 100%;
    max-height: 100%;
}
.chart-slide .caption {
    font-family: var(--font-body);
    font-size: 16px;
    color: var(--text-secondary);
    margin-top: 24px;
}
</style>
</head>
<body>
<div class="chart-slide">
    <h2 id="title"></h2>
    <div class="chart-card">
        <canvas id="chart"></canvas>
    </div>
    <div class="caption" id="caption"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
if (D.caption) document.getElementById('caption').textContent = D.caption;

const values = D.values || [];
const highlightIndex = D.highlight_index != null ? D.highlight_index : values.length - 1;
const bgColors = values.map((_, i) => i === highlightIndex ? '#2563EB' : '#D1D5DB');

const ctx = document.getElementById('chart').getContext('2d');
new Chart(ctx, {
    type: 'bar',
    data: {
        labels: D.labels || [],
        datasets: [{
            label: D.dataset_label || '',
            data: values,
            backgroundColor: bgColors,
            borderRadius: 8,
            borderSkipped: false,
            barPercentage: 0.6,
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: {
            legend: { display: false },
            datalabels: false,
        },
        scales: {
            x: {
                ticks: { color: '#6B7280', font: { family: 'Inter', size: 16 } },
                grid: { display: false },
                border: { color: '#D1D5DB' },
            },
            y: {
                ticks: { color: '#6B7280', font: { family: 'Inter', size: 16 } },
                grid: { color: '#F3F4F6', lineWidth: 1 },
                border: { color: '#D1D5DB' },
                beginAtZero: D.begin_at_zero !== false,
                title: { display: !!D.y_label, text: D.y_label || '', color: '#6B7280', font: { family: 'Inter', size: 16 } },
            }
        }
    }
});
</script>
</body>
</html>
