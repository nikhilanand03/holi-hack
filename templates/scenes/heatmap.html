<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Heatmap</title>
<style>
.heatmap-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    padding: 60px 80px;
    overflow: hidden;
}
.heatmap-slide .slide-title { font-size: 48px; font-weight: 600; margin-bottom: 28px; }
.heatmap-slide .heatmap-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.heatmap-slide .col-labels {
    display: flex;
    margin-bottom: 8px;
}
.heatmap-slide .col-labels span {
    font-size: 22px;
    color: var(--text-secondary);
    text-align: center;
    font-weight: 500;
}
.heatmap-slide .heatmap-grid { display: flex; flex-direction: column; gap: 4px; }
.heatmap-slide .heatmap-row { display: flex; align-items: center; gap: 4px; }
.heatmap-slide .row-label {
    text-align: right;
    padding-right: 16px;
    font-size: 22px;
    color: var(--text-secondary);
    flex-shrink: 0;
    font-weight: 500;
}
.heatmap-slide .cell {
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
}
.heatmap-slide .legend {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 28px;
    font-size: 20px;
    color: var(--text-muted);
}
.heatmap-slide .legend-bar {
    width: 240px;
    height: 14px;
    border-radius: 7px;
    background: linear-gradient(90deg, #1e2235, #818cf8);
}
.heatmap-slide .caption { font-size: 22px; color: var(--text-muted); margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="heatmap-slide">
    <div class="slide-title" id="title"></div>
    <div class="heatmap-container" id="container"></div>
    <div class="caption" id="caption"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
if (D.caption) document.getElementById('caption').textContent = D.caption;

const rows = D.rows || [];
const colLabels = D.column_labels || [];
const rowLabels = D.row_labels || [];
const container = document.getElementById('container');

// Find min/max for color scaling
let allVals = rows.flat();
let minVal = Math.min(...allVals);
let maxVal = Math.max(...allVals);
if (minVal === maxVal) { minVal = 0; maxVal = 1; }

const numCols = colLabels.length || (rows[0] || []).length;
const numRows = rows.length;
// Compute cell size to fill available space (account for row labels and padding)
const rowLabelWidth = 160;
const availW = 1920 - 160 - rowLabelWidth; // slide padding + label
const availH = 1080 - 260; // slide padding + title + caption + legend
const cellSize = Math.min(Math.floor(availW / numCols) - 4, Math.floor(availH / numRows) - 4, 120);

// Column labels
if (colLabels.length) {
    const colDiv = document.createElement('div');
    colDiv.className = 'col-labels';
    colDiv.style.paddingLeft = rowLabelWidth + 'px';
    colLabels.forEach(l => {
        const s = document.createElement('span');
        s.textContent = l;
        s.style.width = cellSize + 'px';
        colDiv.appendChild(s);
    });
    container.appendChild(colDiv);
}

// Grid
const gridDiv = document.createElement('div');
gridDiv.className = 'heatmap-grid';
rows.forEach((row, ri) => {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'heatmap-row';
    const label = document.createElement('div');
    label.className = 'row-label';
    label.style.width = rowLabelWidth + 'px';
    label.textContent = rowLabels[ri] || '';
    rowDiv.appendChild(label);
    row.forEach(val => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.width = cellSize + 'px';
        cell.style.height = cellSize + 'px';
        const t = (val - minVal) / (maxVal - minVal);
        const r = Math.round(30 + t * 99);
        const g = Math.round(34 + t * 107);
        const b = Math.round(53 + t * 195);
        cell.style.background = `rgb(${r},${g},${b})`;
        if (D.show_values !== false) cell.textContent = val;
        rowDiv.appendChild(cell);
    });
    gridDiv.appendChild(rowDiv);
});
container.appendChild(gridDiv);

// Legend
const legend = document.createElement('div');
legend.className = 'legend';
legend.innerHTML = `<span>${minVal}</span><div class="legend-bar"></div><span>${maxVal}</span>`;
container.appendChild(legend);
</script>
</body>
</html>
