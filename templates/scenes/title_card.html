<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
<title>Title Card</title>
<style>
.title-card {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 160px;
    position: relative;
    overflow: hidden;
    text-align: center;
}
.title-card .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--accent-indigo), var(--accent-cyan), var(--accent-emerald));
    animation: bar-grow 1s ease-out both paused;
}
.title-card h1 {
    font-size: 76px;
    font-weight: 700;
    line-height: 1.15;
    max-width: 1500px;
    animation: fade-up 0.8s ease-out both paused;
}
.title-card .authors {
    font-size: 34px;
    color: var(--text-secondary);
    margin-top: 28px;
    animation: fade-up 0.8s ease-out 0.3s both paused;
}
.title-card .subtitle {
    font-size: 30px;
    color: var(--text-muted);
    margin-top: 20px;
    animation: fade-up 0.8s ease-out 0.5s both paused;
}
.title-card .accent-line {
    width: 120px;
    height: 4px;
    background: var(--accent-indigo);
    border-radius: 2px;
    margin: 32px auto 0;
    animation: line-expand 0.6s ease-out 0.7s both paused;
}
/* Background decoration */
.title-card .bg-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.06;
    animation: circle-grow 2s ease-out both paused;
}
.title-card .bg-circle-1 {
    width: 600px; height: 600px;
    right: -100px; top: -100px;
    background: var(--accent-indigo);
}
.title-card .bg-circle-2 {
    width: 400px; height: 400px;
    left: -50px; bottom: -50px;
    background: var(--accent-cyan);
    animation-delay: 0.3s;
}

@keyframes fade-up {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes bar-grow {
    from { transform: scaleX(0); transform-origin: left; }
    to   { transform: scaleX(1); transform-origin: left; }
}
@keyframes line-expand {
    from { width: 0; }
    to   { width: 120px; }
}
@keyframes circle-grow {
    from { transform: scale(0); }
    to   { transform: scale(1); }
}
</style>
</head>
<body>
<div class="title-card">
    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="top-bar"></div>
    <h1 id="title"></h1>
    <div class="authors" id="authors"></div>
    <div class="subtitle" id="subtitle"></div>
    <div class="accent-line"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
document.getElementById('authors').textContent = D.authors || '';
if (D.subtitle) {
    document.getElementById('subtitle').textContent = D.subtitle;
}
</script>
</body>
</html>
