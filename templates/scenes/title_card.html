<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Title Card</title>
<style>
.title-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 96px 128px;
    position: relative;
    overflow: hidden;
}
.title-card {
    width: 100%;
    max-width: 1400px;
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    padding: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    overflow: hidden;
    animation: fade-up 0.8s ease-out both;
}
.title-card .meta-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 64px;
    opacity: 0.8;
    font-family: var(--font-body);
    font-size: 16px;
    color: var(--text-secondary);
}
.title-card h1 {
    font-family: var(--font-title);
    font-size: 60px;
    font-weight: 400;
    letter-spacing: -1px;
    line-height: 1.2;
    margin-bottom: 40px;
    color: var(--text-primary);
    text-align: center;
    max-width: 1200px;
}
.title-card .authors {
    display: flex;
    gap: 64px;
    align-items: center;
    justify-content: center;
    margin-top: 48px;
}
.title-card .author {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}
.title-card .author-name {
    color: var(--text-primary);
    font-size: 24px;
    font-family: var(--font-heading);
    font-weight: 500;
}
.title-card .author-affil {
    color: var(--accent-primary);
    font-size: 16px;
    font-family: var(--font-body);
}
.title-card .author-divider {
    width: 1px;
    height: 40px;
    background: var(--border-color);
}
.title-card .subtitle-text {
    font-size: 24px;
    color: var(--text-secondary);
    margin-top: 24px;
    font-family: var(--font-body);
}
</style>
</head>
<body>
<div class="title-slide">
    <div class="title-card">
        <div class="meta-bar">
            <span id="meta-left">RESEARCH PAPER</span>
            <span id="meta-right"></span>
        </div>
        <h1 id="title"></h1>
        <div class="subtitle-text" id="subtitle"></div>
        <div class="authors" id="authors"></div>
    </div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
if (D.subtitle) {
    document.getElementById('subtitle').textContent = D.subtitle;
} else {
    document.getElementById('subtitle').style.display = 'none';
}
if (D.meta_left) document.getElementById('meta-left').textContent = D.meta_left;
if (D.meta_right) document.getElementById('meta-right').textContent = D.meta_right;
const authorsEl = document.getElementById('authors');
const authors = D.authors || '';
if (typeof authors === 'string' && authors) {
    // Simple string: just show it
    const span = document.createElement('span');
    span.className = 'author-name';
    span.textContent = authors;
    authorsEl.appendChild(span);
} else if (Array.isArray(authors)) {
    authors.forEach((a, i) => {
        if (i > 0) {
            const div = document.createElement('div');
            div.className = 'author-divider';
            authorsEl.appendChild(div);
        }
        const author = document.createElement('div');
        author.className = 'author';
        const name = typeof a === 'string' ? a : (a.name || '');
        const affil = typeof a === 'object' ? (a.affiliation || '') : '';
        author.innerHTML = `<span class="author-name">${name}</span>` +
            (affil ? `<span class="author-affil">${affil}</span>` : '');
        authorsEl.appendChild(author);
    });
}
</script>
</body>
</html>
