<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Big Number</title>
<style>
.big-number-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 80px 160px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.big-number-slide .label {
    font-size: 28px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 16px;
    animation: fade-up 0.6s ease-out both paused;
}
.big-number-slide .number {
    font-size: 160px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent-indigo), var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
    animation: scale-in 0.8s ease-out 0.2s both paused;
}
.big-number-slide .unit {
    font-size: 48px;
    color: var(--text-secondary);
    margin-top: 8px;
    animation: fade-up 0.6s ease-out 0.5s both paused;
}
.big-number-slide .description {
    font-size: 26px;
    color: var(--text-muted);
    max-width: 800px;
    margin-top: 32px;
    animation: fade-up 0.6s ease-out 0.7s both paused;
}
.big-number-slide .bg-glow {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: var(--accent-indigo);
    opacity: 0.04;
    filter: blur(80px);
    animation: circle-grow 1.5s ease-out both paused;
}
@keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes scale-in {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
}
@keyframes circle-grow {
    from { transform: scale(0); }
    to   { transform: scale(1); }
}
</style>
</head>
<body>
<div class="big-number-slide">
    <div class="bg-glow"></div>
    <div class="label" id="label"></div>
    <div class="number" id="number"></div>
    <div class="unit" id="unit"></div>
    <div class="description" id="description"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('label').textContent = D.label || '';
document.getElementById('number').textContent = D.value || '';
if (D.unit) document.getElementById('unit').textContent = D.unit;
if (D.description) document.getElementById('description').textContent = D.description;
</script>
</body>
</html>
