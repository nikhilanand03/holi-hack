<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Big Number</title>
<style>
.big-number-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 96px 128px;
    position: relative;
    overflow: hidden;
}
.big-number-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    padding: 80px 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fade-up 0.8s ease-out both;
}
.big-number-card .value {
    font-family: var(--font-mono);
    font-size: 120px;
    font-weight: 500;
    color: var(--accent-primary);
    line-height: 1;
}
.big-number-card .unit {
    font-family: var(--font-mono);
    font-size: 48px;
    font-weight: 400;
    color: var(--accent-primary);
    margin-left: 8px;
}
.big-number-card .label {
    margin-top: 24px;
    font-family: var(--font-heading);
    font-size: 38px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.5px;
}
.big-number-card .description {
    margin-top: 16px;
    font-family: var(--font-body);
    font-size: 24px;
    color: var(--text-secondary);
    max-width: 600px;
    line-height: 1.6;
}
</style>
</head>
<body>
<div class="big-number-slide">
    <div class="big-number-card">
        <div>
            <span class="value" id="value"></span><span class="unit" id="unit"></span>
        </div>
        <div class="label" id="label"></div>
        <div class="description" id="description"></div>
    </div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('value').textContent = D.value || '';
document.getElementById('label').textContent = D.label || '';
if (D.unit) {
    document.getElementById('unit').textContent = D.unit;
} else {
    document.getElementById('unit').style.display = 'none';
}
if (D.description) {
    document.getElementById('description').textContent = D.description;
} else {
    document.getElementById('description').style.display = 'none';
}
</script>
</body>
</html>
