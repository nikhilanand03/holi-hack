<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Quote Highlight</title>
<style>
.quote-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 0 128px;
    position: relative;
    overflow: hidden;
}
.quote-card {
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    padding: 80px;
    max-width: 1200px;
    position: relative;
    animation: fade-up 0.8s ease-out both;
}
.quote-card .accent-bar {
    position: absolute;
    left: 0;
    top: 80px;
    width: 4px;
    height: 100px;
    background: var(--accent-primary);
    border-radius: 0 2px 2px 0;
}
.quote-card blockquote {
    font-family: var(--font-heading);
    font-size: 36px;
    font-weight: 400;
    font-style: italic;
    letter-spacing: -0.5px;
    line-height: 1.4;
    color: var(--text-primary);
    margin-bottom: 40px;
}
.quote-card .attribution {
    display: flex;
    align-items: center;
    gap: 24px;
}
.quote-card .attribution .divider {
    width: 48px;
    height: 1px;
    background: var(--text-secondary);
}
.quote-card .attribution .name {
    font-family: var(--font-heading);
    font-size: 24px;
    font-weight: 600;
    color: var(--text-primary);
}
.quote-card .attribution .role {
    font-family: var(--font-body);
    font-size: 18px;
    color: var(--text-secondary);
    margin-top: 4px;
}
</style>
</head>
<body>
<div class="quote-slide">
    <div class="quote-card">
        <div class="accent-bar"></div>
        <blockquote id="quote"></blockquote>
        <div class="attribution" id="attribution"></div>
    </div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('quote').textContent = D.quote || '';
const attrEl = document.getElementById('attribution');
const attribution = D.attribution || '';
if (typeof attribution === 'string' && attribution) {
    attrEl.innerHTML = `<div class="divider"></div><div><div class="name">${attribution}</div></div>`;
} else if (typeof attribution === 'object') {
    attrEl.innerHTML = `<div class="divider"></div><div>
        <div class="name">${attribution.name || ''}</div>
        ${attribution.role ? `<div class="role">${attribution.role}</div>` : ''}
    </div>`;
}
</script>
</body>
</html>
