<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Data Table</title>
<style>
.table-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 96px 128px;
    position: relative;
    overflow: hidden;
}
.table-slide h2 {
    font-family: var(--font-heading);
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    margin-bottom: 40px;
    animation: fade-up 0.6s ease-out both;
}
.table-wrap {
    width: 100%;
    background: var(--bg-surface);
    border: 1px solid var(--border-color);
    border-radius: var(--card-radius);
    box-shadow: var(--card-shadow);
    overflow: hidden;
    animation: fade-up 0.7s ease-out 0.1s both;
}
.table-wrap table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
}
.table-wrap th {
    background: #F9FAFB;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    color: var(--accent-primary);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 16px 24px;
    border-bottom: none;
}
.table-wrap td {
    font-family: var(--font-body);
    font-size: 24px;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border-color);
    color: var(--text-primary);
}
.table-wrap tr:last-child td {
    border-bottom: none;
}
.table-wrap tr.row-even {
    background: #F9FAFB;
}
.table-wrap tr.row-odd {
    background: #FFFFFF;
}
.table-wrap tr.row-highlight {
    background: rgba(37, 99, 235, 0.06);
    border-left: 3px solid var(--accent-primary);
}
.table-wrap tr.row-highlight td:first-child {
    color: var(--accent-primary);
    font-weight: 600;
}
.table-wrap td.mono {
    font-family: var(--font-mono);
    font-weight: 500;
}
.table-slide .caption {
    font-family: var(--font-body);
    font-size: 16px;
    color: var(--text-secondary);
    margin-top: 24px;
    animation: fade-up 0.7s ease-out 0.2s both;
}
</style>
</head>
<body>
<div class="table-slide">
    <h2 id="title"></h2>
    <div class="table-wrap">
        <table id="table"></table>
    </div>
    <div class="caption" id="caption"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
if (D.caption) {
    document.getElementById('caption').textContent = D.caption;
} else {
    document.getElementById('caption').style.display = 'none';
}
const table = document.getElementById('table');
const columns = D.columns || [];
const rows = D.rows || [];
const highlightCols = D.highlight_columns || [];
// Header
const thead = document.createElement('thead');
const hrow = document.createElement('tr');
columns.forEach((col, i) => {
    const th = document.createElement('th');
    th.textContent = col;
    if (i > 0) th.style.textAlign = 'right';
    hrow.appendChild(th);
});
thead.appendChild(hrow);
table.appendChild(thead);
// Body
const tbody = document.createElement('tbody');
rows.forEach((row, ri) => {
    const tr = document.createElement('tr');
    const isHighlight = row.highlight || row.isOurs ||
        (highlightCols.length > 0 && row[0] && highlightCols.includes(row[0]));
    if (isHighlight) {
        tr.className = 'row-highlight';
    } else {
        tr.className = ri % 2 !== 0 ? 'row-even' : 'row-odd';
    }
    const cells = Array.isArray(row) ? row : (row.cells || Object.values(row).filter(v => typeof v !== 'boolean'));
    cells.forEach((cell, ci) => {
        const td = document.createElement('td');
        td.textContent = cell;
        if (ci > 0) {
            td.style.textAlign = 'right';
            td.className = 'mono';
        }
        tr.appendChild(td);
    });
    tbody.appendChild(tr);
});
table.appendChild(tbody);
</script>
</body>
</html>
