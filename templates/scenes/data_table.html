<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<link rel="stylesheet" href="../theme.css">
<title>Data Table</title>
<style>
.table-slide {
    width: 1920px;
    height: 1080px;
    display: flex;
    flex-direction: column;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
}
.table-slide .slide-title {
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 36px;
    animation: fade-up 0.6s ease-out both paused;
}
.table-slide .table-wrap {
    flex: 1;
    display: flex;
    align-items: center;
}
.table-slide table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 28px;
    border: 2px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
}
.table-slide th {
    background: var(--bg-accent);
    color: var(--accent-indigo);
    font-weight: 600;
    text-align: left;
    padding: 22px 32px;
    border-bottom: 2px solid var(--border);
    border-right: 1px solid var(--border);
}
.table-slide th:last-child { border-right: none; }
.table-slide td {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    color: var(--text-secondary);
}
.table-slide td:last-child { border-right: none; }
.table-slide tr:last-child td { border-bottom: none; }
.table-slide .cell-anim {
    opacity: 0;
    animation: cell-reveal 0.3s ease-out forwards paused;
}
.table-slide .highlight-cell {
    color: var(--accent-emerald);
    font-weight: 600;
}
.table-slide .caption {
    font-size: 22px;
    color: var(--text-muted);
    margin-top: 20px;
    animation: fade-up 0.5s ease-out 1s both paused;
}
@keyframes fade-up {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}
@keyframes cell-reveal {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
}
</style>
</head>
<body>
<div class="table-slide">
    <div class="slide-title" id="title"></div>
    <div class="table-wrap">
        <table id="dataTable"></table>
    </div>
    <div class="caption" id="caption"></div>
</div>
<script>
const D = window.SCENE_DATA || {};
document.getElementById('title').textContent = D.title || '';
if (D.caption) document.getElementById('caption').textContent = D.caption;

const table = document.getElementById('dataTable');
const headers = D.columns || [];
const rows = D.rows || [];
const highlightCols = D.highlight_columns || [];

// Header row — cells animate left-to-right
if (headers.length) {
    const thead = document.createElement('thead');
    const tr = document.createElement('tr');
    headers.forEach((h, ci) => {
        const th = document.createElement('th');
        th.className = 'cell-anim';
        th.textContent = h;
        th.style.animationDelay = (0.2 + ci * 0.08) + 's';
        tr.appendChild(th);
    });
    thead.appendChild(tr);
    table.appendChild(thead);
}

// Body rows — each cell animates individually, row by row then left to right
const tbody = document.createElement('tbody');
rows.forEach((row, ri) => {
    const tr = document.createElement('tr');
    (Array.isArray(row) ? row : []).forEach((cell, ci) => {
        const td = document.createElement('td');
        td.className = 'cell-anim';
        td.textContent = cell;
        // Stagger: row offset + column offset
        td.style.animationDelay = (0.4 + ri * 0.2 + ci * 0.08) + 's';
        if (highlightCols.includes(ci)) td.classList.add('highlight-cell');
        tr.appendChild(td);
    });
    tbody.appendChild(tr);
});
table.appendChild(tbody);
</script>
</body>
</html>
